<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.package_title }} | {{ page.page_kind }}</title>
  <link rel="stylesheet" href="{{ page.stylesheet_href }}">
  <style>
    .compat-shell { max-width: 860px; position: relative; z-index: 1; }
    .compat-hero { align-items: flex-start; }
    .compat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid #cfd6df;
      background: #fff;
      color: #121826;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 14px;
      text-decoration: none;
    }
    .compat-pill-primary { background: #1e3a5f; border-color: #1e3a5f; color: #fff; }
    .compat-copy { margin: 0; color: #475569; line-height: 1.75; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <main class="shell compat-shell">
    <section class="hero-card compat-hero">
      <div class="logo-wrap">
        <div class="logo-plate"></div>
        <img class="logo-img" src="{{ page.logo_href }}" alt="BLDGBIT | ParcelIQ" />
      </div>
      <div class="hero-text">
        <div class="eyebrow">BLDGBIT | ParcelIQ</div>
        <div class="hero-title">{{ page.truth.address }}</div>
        <p class="compat-copy">The primary ParcelIQ deliverable now lives in <strong>property.html</strong>. This page remains only as a compatibility entry point.</p>
        <div style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px;">
          <a class="compat-pill compat-pill-primary" href="{{ page.primary_href }}">Open primary property package</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
